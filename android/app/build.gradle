apply plugin: 'com.android.application'

android {
    namespace "com.dozingcatsoftware.gunroar"
    compileSdkVersion 35

    defaultConfig {
        applicationId "com.dozingcatsoftware.gunroar"
        minSdkVersion 30
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
